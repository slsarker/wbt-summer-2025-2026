<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form2</title>
  </head>
  <body>
    <h1>Registration Form</h1>
    <form action="#" method="post">
      <fieldset>
        <legend>My Information</legend>
        <label for="fname">First Name</label>
        <input type="text" name="fname" id="fname" required /><br /><br />
        <label for="lname">Last Name</label>
        <input type="text" name="lname" id="lname" required /><br /><br />
        <label for="email">Email :</label>
        <input type="email" name="email" id="email" required /><br /><br />

        <label for="phone">Phone:</label>
        <input type="phone" name="phone" id="phone" required /><br /><br />

        <label for="dob">DOB :</label>
        <input type="date" name="dob" dob required /><br /><br />

        <label for="department">Department: </label><br />
        <select id="department" name="department">
          <option>select your option</option>
          <option value="CSE">CSE</option>
          <option value="EEE">EEE</option>
          <option value="BBA">BBA</option>
          <option value="ENGLISH">ENGLISH</option>
          <option value="CIVIL">CIVIL</option>
        </select>

        <br /><br />
        <input type="checkbox" id="java" name="language" value="java" />
        <label for="java">Java</label><br />
        <input type="checkbox" id="c" name="language" value="c" />
        <label for="c">C</label><br />
        <input type="checkbox" id="python" name="language" value="python" />
        <label for="python">Python</label><br />
        <input
          type="checkbox"
          id="javascript"
          name="language"
          value="javascript"
        />
        <label for="javascript">JavaScript</label><br />

        <br /><br />
        <input type="radio" id="male" name="Gender" value="Male" />
        <label for="male">Male</label><br />
        <input type="radio" id="female" name="Gender" value="Female" />
        <label for="female">Female</label><br />

        <br /><br />
        <label for="photo">upload student photo</label><br />
        <input type="file" id="photo" name="photo" />

        <br /><br />
        <label for="story">Tell us your story:</label>
        <textarea id="story" name="story" rows="5" cols="33"></textarea>
      </fieldset>

      <input type="submit" value="Submit">
      <input type="reset" value="Reset">
    </form>
  </body>
</html>
